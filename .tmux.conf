# プレフィックスキーをctrl+aに変更
set -g prefix C-a

# デフォルトのプレフィックスキーctrl+bを解除
unbind C-b

# 256色モードを有効化
set-option -g default-terminal screen-256color
set -g terminal-overrides 'xterm:colors=256'

# ステータスラインの文字色、背景色を変更
setw -g status-style fg=colour255,bg=colour234

# m キーでマウス操作のオンオフを切り替える
set -g mouse on
bind m run-shell '
  if [ "$(tmux show -g -v mouse)" = "on" ]; then
    tmux set -g mouse off
  else
    tmux set -g mouse on
  fi
'
# ステータスバーにマウス状態の表示を追加
set -g status-right-length 200
set -g status-right "\
#[fg=colour39]PREFIX#[default]: C-a | \
#[fg=colour82]WIN#[default]: c, & | \
#[fg=colour220]PANE#[default]: >, x | \
#[fg=colour196]DETACH#[default]: d | \
#[fg=colour45]PLUGINS#[default]: I U | \
#[fg=colour50]opensessions#[default]: o+s | \
#[fg=colour60]sidebar#[default]: e | \
Mouse: #{?mouse,on,off} | %Y-%m-%d %H:%M \
"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'Ataraxy-Labs/opensessions'
set -g @plugin 'hiroppy/tmux-agent-sidebar'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
