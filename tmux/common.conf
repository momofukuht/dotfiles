# 256色モード
set-option -g default-terminal screen-256color
set -g terminal-overrides 'xterm:colors=256'

# マウス操作
set -g mouse on
bind m run-shell '
  if [ "$(tmux show -g -v mouse)" = "on" ]; then
    tmux set -g mouse off
  else
    tmux set -g mouse on
  fi
'

# ヘルプポップアップ（prefix + h）
bind h display-popup -E -w 60 -h 14 "bash -c \"\
echo ''; \
echo '  Keybindings'; \
echo '  ─────────────────────────────────────'; \
echo '  DETACH   : d'; \
echo '  PLUGINS  : I (install)  U (update)'; \
echo '  Sessions : o+s (opensessions)'; \
echo '  Sidebar  : e (tmux-agent-sidebar)'; \
echo '  ─────────────────────────────────────'; \
echo '  [any key to close]'; \
read -n1 -s; \
\""
