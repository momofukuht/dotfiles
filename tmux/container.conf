source-file ~/dotfiles/tmux/common.conf

# プレフィックス（ホストの C-a と競合しないようデフォルトに）
set -g prefix C-b
unbind C-a

# ステータスライン（赤系でホストと視覚的に区別）
setw -g status-style fg=colour255,bg=colour52
set -g status-right-length 120
set -g status-right "\
#{?client_prefix,#[fg=colour196 bold],#[fg=colour39]}PREFIX#[default]: Ctrl+b | \
#[fg=colour82]WIN#[default]: c(new) &(kill) | \
#[fg=colour220]PANE#[default]: >(menu) x(kill) | \
#[fg=colour220]HELP#[default]: prefix+h | \
Mouse: #{?mouse,on,off} | %Y-%m-%d %H:%M \
"

# プラグインなし（TPM不要）
