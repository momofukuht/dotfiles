source-file ~/dotfiles/tmux/common.conf

# プレフィックス
set -g prefix C-a
unbind C-b

# ステータスライン
setw -g status-style fg=colour255,bg=colour234
set -g status-right-length 120
set -g status-right "\
#{?client_prefix,#[fg=colour196 bold],#[fg=colour39]}Prefix#[default]: Ctrl+a | \
#[fg=colour82]WIN#[default]: c(new) &(kill) | \
#[fg=colour220]PANE#[default]: >(menu) x(kill) | \
#[fg=colour220]HELP#[default]: prefix+h | \
Mouse: #{?mouse,on,off} | %Y-%m-%d %H:%M \
"

# ヘルプポップアップ（prefix + h）
bind h display-popup -E -w 60 -h 14 "bash -c \"\
echo ''; \
echo '  Keybindings'; \
echo '  ─────────────────────────────────────'; \
echo '  DETACH   : d'; \
echo '  PLUGINS  : I (install)  U (update)'; \
echo '  Sessions : o+s (opensessions)'; \
echo '  Sidebar  : e (tmux-agent-sidebar)'; \
echo '  ─────────────────────────────────────'; \
echo '  [any key to close]'; \
read -n1 -s; \
\""

# プラグイン
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'alexwforsythe/tmux-which-key'
set -g @plugin 'Ataraxy-Labs/opensessions'
set -g @plugin 'hiroppy/tmux-agent-sidebar'

run '~/.tmux/plugins/tpm/tpm'
